<!DOCTYPE html>
<html lang="en">
<head>
    <!-- CSS link -->
     <link rel="stylesheet" href="Signup.css">
    <!-- Font Awesome link -->
    <script src="https://kit.fontawesome.com/1d68a8fcd4.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
</head>
<body>
    <header>
        <div class="logo">
            <img src="./Images/Logo design for Medivance.webp" alt="logo">
        </div>
        <div class="nav">
            <ul>
                <li><a href="Home.html">Home</a></li>
            </ul>
        </div>
    </header>
    <form>
        <p>Create an account</p>
        <label for="profile">
            Profile Picture:
            <input type="file" name="profile" placeholder="Add profile">
        </label>
        <br>
        <label for="name">
            First Name:
            <input type="text" name="name" placeholder="First Name" required>
        </label>
        <br>
        <label for="name">
            Last Name:
            <input type="text" name="name" placeholder="Last Name" required> 
        </label>
        <br>
        <label for="email">
            Email Address:
            <input type="email" name="email" placeholder="Email Address" required>
        </label>
        <br>
        <label for="number">
            Phone Number:
            <input type="text" name="number" placeholder="Phone Number" required>
        </label>
        <br>
        <label for="password">
            Password:
            <input type="password" name="password" placeholder="Password" required>
        </label>
        <br>
        <button type="submit">Continue</button>
        <br>
        <div class="account">
            <p>By creating an account you agree to our <a href="Terms and Conditions.html">Terms and Conditions</a> and <a href="Privacy Policy.html">Privacy Policy</p>
            <p>Already have an account? <a href="Login.html">Login</a></p>
        </div>
        <br>
        <div class="socials">
            <a href="https://www.facebook.com/" target="_blank"><i class="fa-brands fa-facebook"></i></a>
            <a href="https://www.instagram.com/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://twitter.com/" target="_blank"><i class="fa-brands fa-twitter"></i></a>
            <a href="https://www.linkedin.com/" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
        </div>
    </form>
</body>
</html>
